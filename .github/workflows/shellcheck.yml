name: shellcheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          format: tty
          severity: warning
        env:
          # -s bash targets bash 3.2 (macOS default) to catch non-portable syntax early.
          # -e SC2034 disables the "unused variable" warning because
          #   craft-statusline.sh declares color constants (blue, green, yellow, etc.)
          #   that are referenced indirectly through variable expansion inside the
          #   color_for_pct function. shellcheck's static analysis cannot see those
          #   references, so the warning is a false positive across all color vars.
          SHELLCHECK_OPTS: -s bash -e SC2034
